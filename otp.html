<!DOCTYPE html>
<html>
<head>
  <title>Verify OTP</title>

  <style>
    body {
  margin: 0;
  font-family: Arial;
  background: #38ef7d;
  display: flex;
  justify-content: center;
  align-items: center;
  height: 100vh;
}


    .card {
      background: white;
      padding: 30px;
      width: 320px;
      border-radius: 12px;
      text-align: center;
      box-shadow: 0px 5px 20px rgba(0,0,0,0.2);
    }

    h2 {
      margin-bottom: 20px;
    }

    input {
      width: 90%;
      padding: 10px;
      margin: 10px 0;
      border: 1px solid #ccc;
      border-radius: 8px;
      outline: none;
      text-align: center;
      font-size: 16px;
      letter-spacing: 3px;
    }

    input:focus {
      border-color: #4facfe;
    }

    button {
      width: 100%;
      padding: 10px;
      background: #4facfe;
      color: white;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      margin-top: 10px;
      font-size: 16px;
    }

    button:hover {
      background: #00c6ff;
    }

    #message {
      margin-top: 15px;
      font-weight: bold;
    }
  </style>

</head>

<body>

<div class="card">
  <h2>Verify OTP</h2>

  <input type="text" id="otpInput" placeholder="Enter OTP">

  <button onclick="verifyOTP()">Verify OTP</button>

  <p id="message"></p>
</div>

<!-- JS (connect your function here) -->
<script>
  
function verifyOTP() {
  let enteredOTP = document.getElementById("otpInput").value;


  if (enteredOTP === "") {
    document.getElementById("message").innerText = "Enter OTP!";
  } 
 
}
</script>

</body>
</html>
