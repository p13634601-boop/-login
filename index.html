<!DOCTYPE html>
<html>
<head>
  <title>Login Page</title>
  <style>
body {
  margin: 0;
  font-family: Arial;
  background: #38ef7d;
  display: flex;
  justify-content: center;
  align-items: center;
  height: 100vh;
}

    .card {
      background: white;
      padding: 30px;
      width: 300px;
      border-radius: 10px;
      text-align: center;
      box-shadow: 0px 5px 15px rgba(0,0,0,0.2);
    }


    h2 {
      margin-bottom: 20px;
    }

    input {
      width: 90%;
      padding: 10px;
      margin: 8px 0;
      border: 1px solid #ccc;
      border-radius: 6px;
      outline: none;
    }

    input:focus {
      border-color: #4facfe;
    }

    button {
      width: 100%;
      padding: 10px;
      background: #4facfe;
      color: white;
      border: none;
      border-radius: 6px;
      cursor: pointer;
      margin-top: 10px;
    }

    button:hover {
      background: #00c6ff;
    }

    a {
      display: block;
      margin-top: 10px;
      text-decoration: none;
      color: #007bff;
    }

    a:hover {
      text-decoration: underline;
    }
  </style>
</head>

<body>

<div class="card">
  <h2>Login</h2>

  <input type="text" placeholder="Email or Phone" id="user"><br>
  <input type="password" placeholder="Password" id="pass"><br>

  <button onclick="loginUser()">Login</button>

  <a href="forgot.html">Forgot Password?</a>
  <a href="reset.html">Reset Password</a>
</div>

  <script>
function loginUser() {
  let user = document.getElementById("user").value;
  let pass = document.getElementById("pass").value;

  // Regex patterns
  let phonePattern = /^[0-9]{10}$/;

  if (user === "" || pass === "") {
    alert("Please fill all fields!");
  } 
  else if (
    !(user.includes("@") && user.includes(".")) &&
    !phonePattern.test(user)
  ) {
    alert("Enter valid email or 10-digit phone number!");
  } 
  else if (pass.length < 8) {
    alert("Password must be at least 8 characters!");
  } 
  else {
    alert("Login Successful ✅");
  }
}
</script>
</body>
</html>
