<!DOCTYPE html>
<html>
<head>
  <title>Forgot Password</title>
  <style>
    body {
  margin: 0;
  font-family: Arial;
  background: #38ef7d;
  display: flex;
  justify-content: center;
  align-items: center;
  height: 100vh;
}

    .card {
      background: white;
      padding: 30px;
      width: 300px;
      border-radius: 10px;
      text-align: center;
      box-shadow: 0px 5px 15px rgba(0,0,0,0.2);
    }

    h2 {
      margin-bottom: 20px;
    }

    input {
      width: 90%;
      padding: 10px;
      margin: 8px 0;
      border: 1px solid #ccc;
      border-radius: 6px;
      outline: none;
    }

    input:focus {
      border-color: #4facfe;
    }

    button {
      width: 100%;
      padding: 10px;
      background: #4facfe;
      color: white;
      border: none;
      border-radius: 6px;
      cursor: pointer;
      margin-top: 10px;
    }

    button:hover {
      background: #00c6ff;
    }
  </style>
</head>
<body>
  <div class="card">
  <h2>Forgot Password</h2>
  <input type="text" placeholder="Enter Email or Phone" id="contact"><br><br>
  <button onclick="sendOTP()">Send OTP</button>
  </div>
   
    <script>
      
function sendOTP() {
  let contact = document.getElementById("contact").value;

  if (contact === "") {
    alert("Enter Email or Phone!");
    return;
  }

  // let otp = Math.floor(1000 + Math.random() * 9000);
  // localStorage.setItem("otp", otp);

  // alert("Your OTP is: " + otp); // demo purpose
  window.location.href = "otp.html";
}
</script>
 
</body>
</html>
